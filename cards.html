<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Notion Card Tool v1.2</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f7f7f5; margin: 0; padding: 0; overflow: hidden; }
        .builder-ui { padding: 40px 20px; text-align: center; overflow: auto; height: 100vh; }
        .box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); display: inline-block; border: 1px solid #eee; width: 90%; max-width: 450px; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        button { padding: 12px; background: #000; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; }
        #copyBtn { background: #007bff; display: none; margin-top: 10px; }
        #res { margin-top: 15px; font-size: 11px; color: #666; word-break: break-all; display: none; border: 1px dashed #ccc; padding: 10px; background: #f9f9f9; }

        /* Layout Notion */
        .container { display: flex; gap: 12px; padding: 10px; height: 100vh; box-sizing: border-box; align-items: stretch; }
        .card { 
            flex: 1; background: #fff; border: 1px solid #e9e9e8; border-radius: 10px; 
            text-decoration: none; color: inherit; display: flex; flex-direction: column; overflow: hidden;
            transition: background 0.2s;
        }
        .card:hover { background: #fcfcfc; }
        .image { width: 100%; height: 50%; background-size: cover; background-position: center; background-color: #f0f0f0; flex-shrink: 0; }
        .content { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; min-height: 0; }
        .title { font-weight: 700; font-size: 13px; margin-bottom: 4px; color: #111; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .desc { font-size: 11px; color: #666; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="builder" class="builder-ui">
    <div class="box">
        <h2>Card Generator v1.2</h2>
        <input type="text" id="l1" placeholder="Link da Esquerda (https://...)">
        <input type="text" id="l2" placeholder="Link da Direita (https://...)">
        <button onclick="gerar()">Gerar Link para Notion</button>
        <div id="res"></div>
        <button id="copyBtn" onclick="copiar()">Copiar Link</button>
    </div>
</div>

<div id="display" class="container hidden"></div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const link1 = urlParams.get('l1');
    const link2 = urlParams.get('l2');

    // Se existirem links na URL, mostra os cards
    if (link1 || link2) {
        document.getElementById('builder').classList.add('hidden');
        document.getElementById('display').classList.remove('hidden');
        if(link1) fetchMeta(link1);
        if(link2) fetchMeta(link2);
    }

    function fetchMeta(url) {
        fetch(`https://api.microlink.io?url=${encodeURIComponent(url)}`)
            .then(r => r.json()).then(res => {
                const d = res.data;
                const cardHtml = `
                    <a class="card" href="${url}" target="_blank">
                        <div class="image" style="background-image: url('${d.image?.url || ''}')"></div>
                        <div class="content">
                            <div class="title">${d.title || 'Link'}</div>
                            <div class="desc">${d.description || ''}</div>
                        </div>
                    </a>`;
                document.getElementById('display').innerHTML += cardHtml;
            });
    }

    function gerar() {
        const b = window.location.origin + window.location.pathname;
        const l1 = document.getElementById('l1').value;
        const l2 = document.getElementById('l2').value;
        const final = `${b}?l1=${encodeURIComponent(l1)}&l2=${encodeURIComponent(l2)}`;
        
        document.getElementById('res').innerText = final;
        document.getElementById('res').style.display = 'block';
        document.getElementById('copyBtn').style.display = 'block';
    }

    function copiar() {
        navigator.clipboard.writeText(document.getElementById('res').innerText).then(() => {
            const btn = document.getElementById('copyBtn');
            btn.innerText = "✅ Copiado!";
            setTimeout(() => { btn.innerText = "Copiar Link"; }, 2000);
        });
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Generator</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; background: #f7f7f5; }
        .box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: inline-block; }
        input { padding: 10px; width: 250px; margin: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; background: black; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #res { margin-top: 20px; font-size: 12px; color: blue; word-break: break-all; max-width: 500px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Gerador de Cards para Notion</h2>
        <input type="text" id="l" placeholder="Link 1 (https://...)">
        <input type="text" id="r" placeholder="Link 2 (https://...)">
        <br>
        <button onclick="go()">Gerar Link Final</button>
        <div id="res"></div>
    </div>

    <script>
        function go() {
            const l = document.getElementById('l').value;
            const r = document.getElementById('r').value;
            const link = window.location.href.split('?')[0] + "?left=" + encodeURIComponent(l) + "&right=" + encodeURIComponent(r);
            document.getElementById('res').innerHTML = "<strong>Copia isto:</strong><br>" + link;
        }
    </script>
</body>
</html>

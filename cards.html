<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Notion Pro Tool</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: -apple-system, sans-serif; background: #f7f7f5; margin: 0; padding: 0; }
        .builder-ui { padding: 40px 20px; text-align: center; }
        .box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); display: inline-block; border: 1px solid #eee; width: 90%; max-width: 500px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; width: 100%; box-sizing: border-box; }
        .full { grid-column: span 2; }
        button { padding: 12px; background: #000; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; width: 100%; margin-top: 10px; }
        #copyBtn { background: #007bff; display: none; }
        #res { margin-top: 15px; font-size: 10px; color: #666; word-break: break-all; display: none; border: 1px dashed #ccc; padding: 10px; }

        /* Estilo Notion */
        .main-container { display: flex; gap: 15px; padding: 10px; height: 100vh; box-sizing: border-box; }
        .column { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .header-title { 
            font-family: 'Montserrat', sans-serif; 
            font-weight: 700; 
            font-size: 14px; 
            margin-bottom: 8px; 
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card { 
            flex: 1; background: #fff; border: 1px solid #e9e9e8; border-radius: 10px; 
            text-decoration: none; color: inherit; display: flex; flex-direction: column; overflow: hidden;
        }
        .image { width: 100%; height: 140px; background-size: cover; background-position: center; background-color: #f0f0f0; }
        .content { padding: 12px; flex-grow: 1; }
        .title { font-weight: 700; font-size: 13px; margin-bottom: 4px; color: #111; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .desc { font-size: 11px; color: #666; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="builder" class="builder-ui">
    <div class="box">
        <h2 style="font-family: Montserrat">Configurador</h2>
        <div class="grid">
            <input type="text" id="t1" placeholder="Título 1">
            <input type="text" id="t2" placeholder="Título 2">
            <input type="text" id="l1" class="full" placeholder="Link 1 (https://...)">
            <input type="text" id="l2" class="full" placeholder="Link 2 (https://...)">
        </div>
        <button onclick="gerar()">Gerar Link</button>
        <div id="res"></div>
        <button id="copyBtn" onclick="copiar()">Copiar Link</button>
    </div>
</div>

<div id="display" class="main-container hidden">
    <div class="column"><div id="h1" class="header-title"></div><div id="c1"></div></div>
    <div class="column"><div id="h2" class="header-title"></div><div id="c2"></div></div>
</div>

<script>
    const p = new URLSearchParams(window.location.search);
    const u1 = p.get('l1'), u2 = p.get('l2'), h1 = p.get('t1'), h2 = p.get('t2');

    if (u1 || u2) {
        document.getElementById('builder').classList.add('hidden');
        document.getElementById('display').classList.remove('hidden');
        document.body.style.background = "transparent";
        if(h1) document.getElementById('h1').innerText = h1;
        if(h2) document.getElementById('h2').innerText = h2;
        if(u1) renderCard('c1', u1);
        if(u2) renderCard('c2', u2);
    }

    function renderCard(id, url) {
        fetch(`https://api.microlink.io?url=${encodeURIComponent(url)}`)
            .then(r => r.json()).then(res => {
                const d = res.data;
                document.getElementById(id).innerHTML = `
                    <a class="card" href="${url}" target="_blank">
                        <div class="image" style="background-image: url('${d.image?.url || ''}')"></div>
                        <div class="content">
                            <div class="title">${d.title || 'Link'}</div>
                            <div class="desc">${d.description || ''}</div>
                        </div>
                    </a>`;
            });
    }

    function gerar() {
        const base = window.location.href.split('?')[0];
        const link = `${base}?t1=${encodeURIComponent(document.getElementById('t1').value)}&t2=${encodeURIComponent(document.getElementById('t2').value)}&l1=${encodeURIComponent(document.getElementById('l1').value)}&l2=${encodeURIComponent(document.getElementById('l2').value)}`;
        document.getElementById('res').innerText = link;
        document.getElementById('res').style.display = 'block';
        document.getElementById('copyBtn').style.display = 'block';
    }

    function copiar() {
        navigator.clipboard.writeText(document.getElementById('res').innerText).then(() => {
            const b = document.getElementById('copyBtn');
            b.innerText = "✅ Copiado!";
            b.style.background = "#28a745";
        });
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion FB Tool v2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        html, body { 
            background: transparent; 
            margin: 0; padding: 0; 
            font-family: 'Montserrat', sans-serif; 
        }
        
        .builder-ui { padding: 40px 20px; text-align: center; background: #f7f7f5; min-height: 100vh; box-sizing: border-box; }
        .box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); display: inline-block; width: 95%; max-width: 450px; border: 1px solid #eee; }
        
        input, button { font-family: 'Montserrat', sans-serif; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        button { padding: 12px; background: #1877f2; color: #fff; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        
        #res { margin-top: 15px; font-size: 11px; word-break: break-all; display: none; border: 1px dashed #ccc; padding: 10px; background: #f9f9f9; }

        .container { 
            display: flex; 
            flex-direction: column;
            align-items: center;
            gap: 12px; 
            padding: 10px; 
            width: 100%; 
            display: none; 
        }

        iframe { max-width: 100%; border: none; border-radius: 8px; background: white; }
    </style>
</head>
<body>

<div id="builder" class="builder-ui">
    <div class="box">
        <h2 style="color:#1877f2">FB Tool v2.0</h2>
        <p style="font-size:12px; color:#666">Cole o link do post ou o código do Iframe:</p>
        <input type="text" id="fb1" placeholder="Link ou Iframe do Post 1">
        <input type="text" id="fb2" placeholder="Link ou Iframe do Post 2 (Opcional)">
        <button onclick="gerar()">Gerar Link Limpo</button>
        <div id="res"></div>
        <button id="copyBtn" onclick="copiar()" style="display:none; background:#007bff; margin-top:10px;">Copiar Link</button>
    </div>
</div>

<div id="display" class="container"></div>

<script>
    const p = new URLSearchParams(window.location.search);
    const u1 = p.get('u1'), u2 = p.get('u2');

    if (u1 || u2) {
        document.getElementById('builder').style.display = 'none';
        document.getElementById('display').style.display = 'flex';
        if(u1) renderFB(u1);
        if(u2) renderFB(u2);
    }

    // Esta função limpa o input e extrai apenas o URL do post
    function limparURL(input) {
        if (input.includes('<iframe')) {
            // Se for um iframe, extrai o que está dentro de href=...
            const match = input.match(/href=([^&"'>]+)/);
            return match ? decodeURIComponent(match[1]) : input;
        }
        return input;
    }

    function renderFB(url) {
        const encoded = encodeURIComponent(url);
        document.getElementById('display').innerHTML += `
            <iframe 
                src="https://www.facebook.com/plugins/post.php?href=${encoded}&show_text=true&width=500" 
                width="500" height="700" scrolling="no" frameborder="0" 
                allowfullscreen="true" allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share">
            </iframe>`;
    }

    function gerar() {
        const raw1 = document.getElementById('fb1').value;
        const raw2 = document.getElementById('fb2').value;

        const clean1 = limparURL(raw1);
        const clean2 = limparURL(raw2);

        const final = window.location.origin + window.location.pathname + 
                      "?u1=" + encodeURIComponent(clean1) + 
                      "&u2=" + encodeURIComponent(clean2);

        document.getElementById('res').innerText = final;
        document.getElementById('res').style.display = 'block';
        document.getElementById('copyBtn').style.display = 'block';
    }

    function copiar() {
        navigator.clipboard.writeText(document.getElementById('res').innerText).then(() => {
            alert("Copiado!");
        });
    }
</script>
</body>
</html>
